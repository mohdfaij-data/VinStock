<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — VinStock</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="/"><span class="bars">📈</span> VinStock</a>
    <div></div>
    <div></div>
  </nav>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-wrap">
        {% for category, message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="sub">Log in to access your watchlists and saved screens.</p>
      <form method="POST">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" value="{{ email or '' }}" required autofocus>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn-primary">Log in</button>
      </form>
      <div class="auth-switch">Don't have an account? <a href="/register">Sign up</a></div>
    </div>
  </div>
</body>
</html>
